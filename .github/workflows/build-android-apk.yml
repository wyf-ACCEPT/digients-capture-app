name: Build Android APK + AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-android-apk.yml'
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/build-android-apk.yml'
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'

jobs:
  build:
    name: Build release APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Show toolchain versions
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Restore release signing config
        env:
          KEYSTORE_B64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
        run: |
          # No secret (e.g. fork PR) -> skip; release build falls back to debug signing.
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::UPLOAD_KEYSTORE_BASE64 not set — release artifacts will be DEBUG-signed."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/upload-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties
          echo "Release signing enabled (wrote android/key.properties + upload-keystore.jks)."

      - name: Set Short SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

      - name: Build release APK (universal)
        run: flutter build apk --release

      - name: Build release AAB (for Google Play)
        run: flutter build appbundle --release

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/digients-capture-${{ env.SHORT_SHA }}.apk
          cp build/app/outputs/bundle/release/app-release.aab \
             dist/digients-capture-${{ env.SHORT_SHA }}.aab
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: digients-capture-apk-${{ env.SHORT_SHA }}
          path: dist/*.apk
          retention-days: 14
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: digients-capture-aab-${{ env.SHORT_SHA }}
          path: dist/*.aab
          retention-days: 14
          if-no-files-found: error
