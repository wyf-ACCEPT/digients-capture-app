plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Load the release signing config from android/key.properties when present
// (local builds and CI, which restores it from secrets). Absent on plain
// checkouts / PRs, so those builds fall back to debug signing and still succeed.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.digients.capture"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // Published Google Play package name. Uses the company-owned domain
        // (digients.tech → tech.digients.capture), matching the iOS bundle ID.
        // `namespace` above stays com.digients.capture (internal R/BuildConfig
        // package only); applicationId and namespace are independent in AGP.
        applicationId = "tech.digients.capture"
        // API 26+ required: Camera2 LENS_INTRINSIC_CALIBRATION + HEVC encoder.
        minSdk = 26
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias = keystoreProperties["keyAlias"]
                keyPassword = keystoreProperties["keyPassword"]
                storeFile = keystoreProperties["storeFile"] ? rootProject.file(keystoreProperties["storeFile"]) : null
                storePassword = keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            // Release upload key when key.properties is present (local + CI);
            // otherwise fall back to debug signing so plain checkouts build.
            signingConfig = keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
            // R8 trips on transitive AutoValue references inside MediaPipe
            // Tasks Vision (javax.lang.model.* — annotation-processor APIs
            // not present at runtime). Disabling minification skips the
            // R8 pass entirely. APK is ~3× larger but ships cleanly. If
            // size becomes a concern we can add proguard-rules.pro with
            // -dontwarn javax.lang.model.** and friends.
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // ARCore was the v1.1 SharedCamera pose source. v1.2 drops it: pose
    // reconstruction now happens entirely offline (DROID-SLAM today,
    // offline VIO next), so the mobile side records video + raw IMU only.
    // See docs/specs/RECORDING_DATA_STRUCTURE_V1.2.md.

    // MediaPipe Tasks Vision — on-device HandLandmarker for the V2 hand-presence
    // feedback layer. Inference runs at 10 fps on a dedicated thread and never
    // touches the recording pipeline.
    implementation 'com.google.mediapipe:tasks-vision:0.10.18'
}
