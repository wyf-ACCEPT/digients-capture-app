plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.digients.capture"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.digients.capture"
        // API 26+ required: Camera2 LENS_INTRINSIC_CALIBRATION + HEVC encoder.
        minSdk = 26
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // ARCore (Google AR Core) — provides 6DOF pose via Shared Camera mode so we
    // can keep Camera2 + MediaCodec recording while pose data is computed alongside.
    // Declared "optional" in the manifest, so devices without ARCore install simply
    // fall back to the imu_raw tier per RECORDING_DATA_STRUCTURE_V1.1.md §4.
    implementation 'com.google.ar:core:1.46.0'
}
