plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.digients.capture"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.digients.capture"
        // API 26+ required: Camera2 LENS_INTRINSIC_CALIBRATION + HEVC encoder.
        minSdk = 26
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // ARCore was the v1.1 SharedCamera pose source. v1.2 drops it: pose
    // reconstruction now happens entirely offline (DROID-SLAM today,
    // offline VIO next), so the mobile side records video + raw IMU only.
    // See docs/specs/RECORDING_DATA_STRUCTURE_V1.2.md.

    // MediaPipe Tasks Vision — on-device HandLandmarker for the V2 hand-presence
    // feedback layer. Inference runs at 10 fps on a dedicated thread and never
    // touches the recording pipeline.
    implementation 'com.google.mediapipe:tasks-vision:0.10.18'
}
